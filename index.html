<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XVII . V</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Aref+Ruqaa&display=swap" rel="stylesheet">

<style>
:root{
    --main:#2a014f;
    --accent:#b388ff;
    --soft:#e0d4ff;
}

/* خلفية */
body{
    margin:0;
    background: radial-gradient(circle at center,#1a0033,#000);
    font-family:'Aref Ruqaa', serif;
    color:#eee;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* الصندوق */
.box{
    width:90%;
    max-width:850px;
    padding:50px 30px;
    border-radius:25px;
    background: rgba(20,0,40,0.8);
    backdrop-filter: blur(12px);
    border:1px solid rgba(179,136,255,0.2);
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
    text-align:center;
    position:relative;
}

/* زخرفة */
.box::before,
.box::after{
    content:"❦";
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    color:var(--accent);
    font-size:22px;
    opacity:0.6;
}

.box::before{ top:10px; }
.box::after{ bottom:10px; }

/* عنوان */
h1{
    font-family:'Cinzel';
    font-size:4rem;
    color:var(--accent);
    letter-spacing:8px;
    margin-bottom:20px;
}

/* خط */
.divider{
    width:120px;
    height:1px;
    margin:20px auto;
    background:linear-gradient(to right,transparent,var(--accent),transparent);
}

/* نص علوي */
.note{
    font-size:1.8rem;
    color:var(--soft);
    margin-bottom:15px;
}

/* النص مع تأثير الكتابة */
.text{
    font-size:1.3rem;
    line-height:2;
    color:#ccc;
    min-height:120px;
    white-space:pre-line;
}

/* زر الموسيقى */
.music-btn{
    position:absolute;
    bottom:20px;
    right:20px;
    width:45px;
    height:45px;
    border-radius:50%;
    background:transparent;
    border:1px solid rgba(179,136,255,0.3);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.music-btn:hover{
    background:rgba(179,136,255,0.1);
}

/* أيقونة */
.play-icon{
    width:0;
    height:0;
    border-left:10px solid var(--accent);
    border-top:6px solid transparent;
    border-bottom:6px solid transparent;
}

</style>
</head>

<body>

<div class="box">

<h1>XVII . V</h1>
<h2>17.5.2009</h2>

<div class="divider"></div>

<p class="note">إلى تلك التي لا تُقاس بالأيام…</p>

<p class="text" id="typed"></p>

<div class="divider"></div>

<p style="font-family:Cinzel; letter-spacing:4px;">Happy Birthday<br>غزولة نحبك</p>

<div class="music-btn" onclick="toggle()">
    <span class="play-icon"></span>
</div>

</div>

<audio id="m" loop>
<source src="golden_brown.mp3">
</audio>

<script>
// ===== تأثير الكتابة =====
const text = `في هذا اليوم، لم يبدأ عمرٌ جديد،  
بل استمر وجودٌ لا يشبه أحدًا…  
وجودٌ يمرّ كقصيدة، ويُترك كأثر لا يُنسى.`;

let i = 0;
const speed = 90;

function typeWriter(){
    if(i < text.length){
        document.getElementById("typed").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

window.onload = typeWriter;

// ===== الموسيقى =====
function toggle(){
    let m=document.getElementById("m");
    let icon=document.querySelector(".play-icon");

    if(m.paused){
        m.play();
        icon.style.border="none";
        icon.style.width="8px";
        icon.style.height="14px";
        icon.style.background="#b388ff";
        icon.style.boxShadow="6px 0 0 #b388ff";
    }else{
        m.pause();
        icon.removeAttribute("style");
    }
}
</script>

</body>
</html>
