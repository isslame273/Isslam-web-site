<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XVII . V | Happy Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059; /* ذهبي مطفي أكثر فخامة */
            --gold-bright: #f3e5ab;
            --text-light: #f4f4f4;
            --overlay-bg: rgba(0, 0, 0, 0.75);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: var(--text-light);
            font-family: 'Amiri', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3;
            background-image: url('walpaper.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: grayscale(20%) brightness(40%);
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, black 100%);
            z-index: -2;
        }

        #particles-js {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.4;
        }

        /* --- الصندوق الفاخر --- */
        .box {
            position: relative;
            width: 90%;
            max-width: 1000px;
            min-height: 75vh;
            background-color: transparent;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
        }

        /* خيط الضوء الذهبي المتحرك */
        .box::before {
            content: "";
            position: absolute;
            width: 250%;
            height: 250%;
            background-image: conic-gradient(
                transparent, 
                var(--gold) 10%, 
                transparent 20%, 
                transparent 50%, 
                var(--gold) 60%, 
                transparent 70%, 
                transparent
            );
            animation: rotate 8s linear infinite;
            z-index: 0;
        }

        /* الواجهة الداخلية (زجاجية) */
        .box::after {
            content: "";
            position: absolute;
            inset: 2px; /* إطار أنحف يعطي أناقة أكثر */
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.9), rgba(5, 5, 5, 0.95));
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('walpaper.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 38px;
            z-index: 1;
            backdrop-filter: blur(15px);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* المحتوى */
        .main-wrapper {
            position: relative;
            z-index: 2;
            padding: 5rem 3rem;
            text-align: center;
            width: 100%;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: clamp(3rem, 8vw, 6rem);
            margin: 0;
            font-weight: 400;
            letter-spacing: 15px;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
            animation: fadeInOut 4s ease-in-out infinite alternate;
        }

        .ornament {
            color: var(--gold);
            font-size: 2rem;
            margin: 1.5rem 0;
            opacity: 0.7;
        }

        .deep-love-note {
            font-family: 'Aref Ruqaa', serif;
            font-size: clamp(1.8rem, 4vw, 3rem);
            color: var(--gold-bright);
            letter-spacing: 1px;
            margin: 2.5rem 0;
        }

        .prose-text {
            font-size: clamp(1.3rem, 2.2vw, 1.8rem);
            font-weight: 300;
            line-height: 2.2;
            color: #ccc;
            max-width: 800px;
            margin: 0 auto 2.5rem;
        }

        .divider {
            height: 1px; /* أنحف */
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            width: 300px;
            margin: 0 auto 3rem;
            opacity: 0.6;
        }

        footer {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 6rem;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* تألق خفيف للنص */
        @keyframes fadeInOut {
            from { opacity: 0.8; text-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }
            to { opacity: 1; text-shadow: 0 0 30px rgba(197, 160, 89, 0.5); }
        }

        /* الظهور التدريجي */
        .reveal {
            opacity: 0;
            animation: elegantFade 2.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .hero-section { animation-delay: 0.8s; }
        .character-card { animation-delay: 2s; }
        .date-touch-section { animation-delay: 3.2s; }
        footer { animation-delay: 4.5s; }

        @keyframes elegantFade {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
<body>

    <div class="page-background"></div>
    <div class="background-overlay"></div>
    <div id="particles-js"></div>

    <div class="box reveal">
        <div class="main-wrapper">
            <header class="hero-section reveal">
                <div class="ornament">◈</div>
                <h1>XVII . V</h1>
                <p style="font-family: 'Cinzel'; color: var(--gold); font-size: 0.8rem; letter-spacing: 5px; opacity: 0.8;">EXISTENCE OVER ESSENCE</p>
                <div class="ornament">◈</div>
            </header>

            <section class="character-card reveal">
                <div class="text-content">
                    <span class="deep-love-note">إلى تلك التي ترفض القيود..</span>
                    <p class="prose-text">happy birthday غزولة نحبك</p>
                </div>
            </section>

            <section class="date-touch-section reveal">
                <div class="divider"></div>
                <p class="prose-text" style="font-family: 'Cinzel'; font-weight: 400; color: var(--gold); letter-spacing: 5px;">17 . 05 . 2009</p>
            </section>

            <footer class="reveal">
                BEYOND ALL NARRATIVES // 2009 — 2026
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 30 }, /* عدد أقل لزيادة الفخامة */
                "color": { "value": "#c5a059" },
                "opacity": { "value": 0.2 },
                "size": { "value": 1.5 },
                "move": { "enable": true, "speed": 0.5 } /* حركة أبطأ جداً */
            }
        });
    </script>
</body>
</html>
